# Default prompt templates (generation_prompts.yaml), written by SemanticQAGen.
# Edit freely. This file is NOT overwritten once it exists.
#
# This is YAML, not Python: do NOT add a leading """docstring""".
# Braces in JSON examples are doubled ({{ }}) because each template is
# consumed by str.format(); single braces will break formatting.

question_generation:
  description: "Generates source-grounded question/answer pairs from a text chunk."
  json_output: true
  system_prompt: "You are an expert at writing question-answer pairs from source text for training language models. You ground every answer in the provided passage and use no outside knowledge. You write each question so it names its own subject and reads as a complete, freestanding question, and each answer so it restates that subject as a standalone statement of fact, as concise as fully answering allows and never padded. You match the form of the worked examples you are given. You return strictly valid JSON and nothing else."
  template: |
    Write question-answer pairs from the source text below. Ground every answer in what the passage states, and write each pair so it stands on its own as training data, where the source passage will NOT be shown alongside it.

    Source text:
    ---
    {chunk_content}
    ---

    Analyzer context (use this to choose what to ask about and how deeply to answer; do not quote it back in your output):
    - Key concepts to target: {key_concepts}
    - Full analyzer output (JSON): {analysis_details}

    Target counts (upper bounds, not quotas):
    - Up to {factual_count} factual questions
    - Up to {inferential_count} inferential questions
    - Up to {conceptual_count} conceptual questions
    - Total: up to {total_questions} questions

    Category definitions (label each question with exactly one):

    - factual: answerable from a single span of the source text. The answer is directly stated in the passage.
    - inferential: requires combining two or more distinct pieces of information from the source text. The answer follows from what is stated without being stated outright.
    - conceptual: requires identifying a principle, pattern, or generalization the source text supports, synthesizing across the passage while staying grounded in what it says.

    How to ground each pair:

    1. Use only the source text. Draw on no outside or common knowledge beyond what the passage states.
    2. Make the answer fully supported by the passage and directly responsive to the question, with no padding.
    3. Generate a question only when the passage supports a complete answer.

    How to make each pair stand on its own:

    4. Name the subject of every question explicitly — the concept, system, method, person, or entity it is about — so a reader who has never seen the passage understands and can answer it. If the passage never names the subject it describes, do not ask about it.
    5. Write each answer as a freestanding statement of fact that restates its subject. Prefer "The Peace of Westphalia ended ..." over "It ended ..." or "The treaty mentioned is ...".
    6. Vary the phrasing and the question stems across the set; do not start every question the same way.

    How long each answer should be:

    7. Make each answer only as long as fully answering requires, and no longer. Length follows the question, not a fixed target. As a guide: factual answers are usually a single sentence; inferential answers give just enough to show how the combined facts connect; conceptual answers state the principle and what grounds it, typically two to three sentences.
    8. There is no minimum length and no quota of words. Never pad an answer to seem thorough, never add background, restatement, or hedging the question did not ask for, and do not inflate the answer because the question was hard. A complete short answer is better than a padded long one.

    Examples of well-formed pairs (these illustrate FORM ONLY — write your questions about the source text above, NOT about these topics. Note how the factual answers stop as soon as the fact is stated):
    [
        {{
            "question": "What treaty ended the Thirty Years' War?",
            "answer": "The Peace of Westphalia ended the Thirty Years' War in 1648.",
            "category": "factual"
        }},
        {{
            "question": "Why does a central bank raising interest rates tend to reduce inflation but slow economic growth?",
            "answer": "Higher rates make borrowing more expensive, which curbs spending and eases upward pressure on prices; the same drop in spending also slows output and hiring, which dampens growth.",
            "category": "inferential"
        }},
        {{
            "question": "How does natural selection lead a population to become better adapted to its environment over time?",
            "answer": "Individuals whose traits suit their environment tend to survive and reproduce more, so those traits grow more common across generations, gradually shifting the population toward greater adaptation.",
            "category": "conceptual"
        }},
        {{
            "question": "Which clustering algorithm does product quantization use to group the vectors in each sub-space into k centroids?",
            "answer": "Product quantization uses k-means clustering to group the vectors in each sub-space into k centroids.",
            "category": "factual"
        }}
    ]

    Return your output as a JSON array with this exact structure, one object per question:
    [
        {{
            "question": "The question text, naming its own subject.",
            "answer": "The answer, fully supported by the source text.",
            "category": "factual"
        }}
    ]

    The "category" field must be exactly one of: "factual", "inferential", "conceptual".

    **CRITICAL: Your response MUST be ONLY a JSON array conforming to RFC 8259.**
    **DO NOT include any comments (// or #), markdown code fences, or any text outside the JSON array.**

