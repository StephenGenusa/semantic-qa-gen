# Default prompt templates (analysis_prompts.yaml), written by SemanticQAGen.
# Edit freely. This file is NOT overwritten once it exists.
#
# This is YAML, not Python: do NOT add a leading """docstring""".
# Braces in JSON examples are doubled ({{ }}) because each template is
# consumed by str.format(); single braces will break formatting.

chunk_analysis:
  description: "Analyzes a text chunk for information density and question potential."
  json_output: true
  system_prompt: "You are an expert analyst who evaluates source passages to determine how many high-quality, source-grounded questions can be generated from them. You return strictly valid JSON and nothing else."
  template: |
    Analyze the following text passage to estimate how many source-grounded questions can be generated from it.

    Text passage:
    ---
    {chunk_content}
    ---

    Score the passage on three dimensions, each a float between 0.0 and 1.0:
    - information_density: how much factual content per unit of text
    - topic_coherence: how focused the passage is on a single topic
    - complexity: how technically or conceptually difficult the content is

    Then estimate how many questions of each category could be answered using only information present in this passage. Use these category definitions:

    - factual: answerable by quoting or paraphrasing a single span of the text.
    - inferential: requires combining two or more distinct pieces of information from the text.
    - conceptual: requires identifying a principle or generalization that the text supports.

    Estimate counts assuming roughly one substantive question per 100-150 words of meaningful content. The total across all three categories must not exceed 10. If the passage is short, contains little substantive content, or is largely boilerplate, return zeros.

    Finally, list 3-7 key concepts, terms, or named entities from the passage. These will be passed to the question generator to anchor what the questions should cover.

    Return your analysis in EXACTLY this JSON format. The values shown below are illustrative of the expected ranges; replace them with values appropriate to the passage you analyzed:
    {{
        "information_density": 0.65,
        "topic_coherence": 0.80,
        "complexity": 0.50,
        "estimated_question_yield": {{
            "factual": 3,
            "inferential": 2,
            "conceptual": 1
        }},
        "key_concepts": ["concept1", "concept2", "concept3"],
        "notes": "Brief observations about the passage that would help a question writer."
    }}

    **CRITICAL: Your response MUST be ONLY a single, strictly valid JSON object conforming to RFC 8259.**
    **DO NOT include any comments (// or #), markdown code fences, or any text outside the JSON structure.**

